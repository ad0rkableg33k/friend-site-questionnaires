<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Site Questionnaires</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #ffffff;
    color: #22252a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .wrap { max-width: 480px; padding: 24px; text-align: center; }
  h1 { font-size: 1.6rem; margin-bottom: 8px; }
  p.sub { color: #6b7280; margin-top: 0; margin-bottom: 36px; }
  .card {
    display: block;
    text-decoration: none;
    border-radius: 14px;
    padding: 22px 24px;
    margin-bottom: 18px;
    font-weight: 600;
    font-size: 1.05rem;
    color: #fff;
    transition: opacity 0.15s ease;
  }
  .card:hover { opacity: 0.9; }
  .glass { background: #4b5563; }
  .cake { background: #b5544a; }
  .card small {
    display: block;
    font-weight: 400;
    font-size: 0.85rem;
    margin-top: 4px;
    opacity: 0.85;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Site Questionnaires</h1>
  <p class="sub">Pick your business below to get started</p>

  <a class="card glass" href="glass.html">
    🔥 Glass Shop Questionnaire
    <small>Oil burners &amp; bubblers</small>
  </a>

  <a class="card cake" href="cheesecake.html">
    🍰 Cheesecake Questionnaire
    <small>Business site details</small>
  </a>
</div>
</body>
</html>
