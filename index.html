<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Site Questionnaires</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Space+Grotesk:wght@400;500;700&display=swap');

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: #0a0a0d;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(255,20,147,0.08), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(255,0,255,0.08), transparent 40%);
    color: #f5f0f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .wrap { max-width: 520px; width: 100%; text-align: center; }

  .eyebrow {
    font-family: 'Special Elite', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #ff69b4;
    margin-bottom: 10px;
  }

  h1 {
    font-size: 2.1rem;
    font-weight: 700;
    letter-spacing: -0.01em;
    background: linear-gradient(90deg, #ff1493, #ff69b4, #d946ef);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 8px;
  }

  p.sub {
    color: #a89aab;
    font-size: 0.95rem;
    margin-bottom: 40px;
  }

  .card {
    display: flex;
    align-items: center;
    gap: 16px;
    text-decoration: none;
    border-radius: 4px;
    padding: 20px 22px;
    margin-bottom: 16px;
    text-align: left;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,105,180,0.25);
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
  }
  .glass::before { background: #9ca3af; }
  .cake::before { background: #ff6b6b; }

  .card:hover {
    border-color: #ff1493;
    background: rgba(255,20,147,0.06);
    transform: translateX(4px);
  }

  .icon {
    font-size: 1.8rem;
    filter: drop-shadow(0 0 6px rgba(255,105,180,0.4));
  }

  .label {
    font-weight: 700;
    font-size: 1.05rem;
    color: #ffffff;
  }
  .label small {
    display: block;
    font-weight: 400;
    font-size: 0.82rem;
    color: #a89aab;
    margin-top: 2px;
  }

  .arrow {
    margin-left: auto;
    color: #ff69b4;
    font-size: 1.2rem;
  }

  footer {
    margin-top: 36px;
    font-family: 'Special Elite', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    color: #5c525e;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">◈ intake forms ◈</div>
  <h1>Site Questionnaires</h1>
  <p class="sub">pick your business below to get started</p>

  <a class="card glass" href="Questionnaire/glass.html">
    <span class="icon">🔥</span>
    <span class="label">Glass Shop Questionnaire<small>Oil burners &amp; bubblers</small></span>
    <span class="arrow">→</span>
  </a>

  <a class="card cake" href="Questionnaire/cheesecake.html">
    <span class="icon">🎵</span>
    <span class="label">Music Artist Questionnaire<small>Business site details</small></span>
    <span class="arrow">→</span>
  </a>

  <footer>ad0rkableg33k build system</footer>
</div>
</body>
</html>
